<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3분 진단 신청 | Owner-Dependency Scanner</title>
  <style>
    :root { --bg:#0b1020; --card:#111831; --text:#f4f7ff; --muted:#b9c3e6; --line:#273357; --accent:#7c9bff; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    .wrap{max-width:760px;margin:0 auto;padding:24px 16px 60px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0}
    h1{margin:0 0 8px;font-size:30px}
    .muted{color:var(--muted)}
    label{display:block;margin:14px 0 6px;font-weight:600}
    input,select,textarea{width:100%;padding:11px 12px;border-radius:10px;border:1px solid #3b4a79;background:#0e1530;color:var(--text);font:inherit}
    textarea{min-height:84px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:640px){.row{grid-template-columns:1fr}}
    .btn{margin-top:14px;display:inline-block;padding:12px 16px;border-radius:10px;border:0;background:linear-gradient(90deg,var(--accent),#9d8cff);color:#08102a;font-weight:700;cursor:pointer}
    .link{color:var(--muted);text-decoration:none}
    .tip{font-size:13px;color:var(--muted);margin-top:8px}
    .help{background:#0e1530;border:1px dashed #40528a;border-radius:10px;padding:12px;margin-top:10px}
    .help b{display:block;margin-bottom:6px}
    .help a{color:#b9c3e6}
    .next{display:none;background:#0e1530;border:1px solid #40528a;border-radius:12px;padding:14px;margin-top:14px}
    .next.show{display:block}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .btn2{display:inline-block;padding:10px 12px;border-radius:10px;border:1px solid #4e6198;color:var(--text);text-decoration:none;font-weight:600}
    .status{font-size:13px;color:#b9c3e6;margin-top:8px}
  </style>
</head>
<body>
  <main class="wrap">
    <a href="./index.html" class="link">← 랜딩으로 돌아가기</a>
    <section class="card">
      <h1>3분 진단 신청</h1>
      <p class="muted">입력 후 "신청 제출"을 누르면 내용이 복사되고 문의 채널로 이동합니다. (공개 저장소에 신청 정보를 남기지 않습니다)</p>
      <div class="help">
        <b>문의 채널 (둘 중 하나로 전송)</b>
        1) Telegram: <a href="https://t.me/mangooes_bot" target="_blank" rel="noreferrer">@mangooes_bot</a><br/>
        2) Email: <a href="mailto:mangoo.wq@gmail.com">mangoo.wq@gmail.com</a>
      </div>
    </section>

    <form id="riskForm" class="card">
      <label>회사/브랜드명</label>
      <input name="company" required placeholder="예: OO 스튜디오" />

      <div class="row">
        <div>
          <label>업종</label>
          <input name="industry" required placeholder="예: 마케팅 대행, 제조, 이커머스" />
        </div>
        <div>
          <label>팀 규모</label>
          <select name="teamSize" required>
            <option value="">선택</option>
            <option>1-3</option>
            <option>4-10</option>
            <option>11-30</option>
            <option>31+</option>
          </select>
        </div>
      </div>

      <label>대표가 3일 비우면 가장 먼저 멈추는 업무</label>
      <textarea name="criticalTask" required placeholder="예: 거래처 단가 승인 / 예외 클레임 결정"></textarea>

      <div class="row">
        <div>
          <label>하루 손실 추정</label>
          <select name="dailyLoss" required>
            <option value="">선택</option>
            <option>10만원 미만</option>
            <option>10-50만원</option>
            <option>50-200만원</option>
            <option>200만원+</option>
          </select>
        </div>
        <div>
          <label>문서화 수준 (1~10)</label>
          <input name="docLevel" type="number" min="1" max="10" required placeholder="7" />
        </div>
      </div>

      <label>결과 받을 이메일</label>
      <input name="email" type="email" required placeholder="name@company.com" />

      <label>추가 메모 (선택)</label>
      <textarea name="note" placeholder="현재 가장 걱정되는 운영 리스크 1개"></textarea>

      <button type="submit" class="btn">신청 제출</button>
      <p class="tip">제출 순서: ①신청 제출 → ②복사 상태 확인 → ③채널 버튼 눌러 전송</p>

      <div id="nextStep" class="next" aria-live="polite">
        <b>마지막 1단계: 아래 버튼으로 전송해 주세요</b>
        <div class="actions">
          <a id="tgLink" class="btn2" href="https://t.me/mangooes_bot" target="_blank" rel="noreferrer">Telegram 열기</a>
          <a id="mailLink" class="btn2" href="mailto:mangoo.wq@gmail.com">Email 열기</a>
          <button id="copyBtn" type="button" class="btn2">다시 복사</button>
        </div>
        <div id="copyStatus" class="status">복사 대기 중</div>
        <textarea id="payload" readonly style="margin-top:10px;min-height:140px"></textarea>
      </div>
    </form>
  </main>

  <script>
    const form = document.getElementById('riskForm');
    const nextStep = document.getElementById('nextStep');
    const payload = document.getElementById('payload');
    const copyBtn = document.getElementById('copyBtn');
    const copyStatus = document.getElementById('copyStatus');
    const mailLink = document.getElementById('mailLink');

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        copyStatus.textContent = '✅ 신청 내용 복사 완료. Telegram 또는 Email 버튼을 눌러 전송해 주세요.';
      } catch (_) {
        copyStatus.textContent = '⚠️ 자동 복사 실패. 아래 텍스트를 수동 복사해서 전송해 주세요.';
      }
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const f = e.target;
      const get = (n) => (f.elements[n]?.value || '').trim();

      const body = [
        '[Owner-Risk 파일럿 신청]',
        `회사/브랜드명: ${get('company')}`,
        `업종: ${get('industry')}`,
        `팀 규모: ${get('teamSize')}`,
        `대표 3일 부재 시 멈추는 업무: ${get('criticalTask')}`,
        `하루 손실 추정: ${get('dailyLoss')}`,
        `문서화 수준(1~10): ${get('docLevel')}`,
        `결과 수신 이메일: ${get('email')}`,
        `추가 메모: ${get('note') || '-'}`
      ].join('\n');

      payload.value = body;
      nextStep.classList.add('show');

      const subject = encodeURIComponent('[Owner-Risk] 파일럿 신청');
      const mailBody = encodeURIComponent(body);
      mailLink.href = `mailto:mangoo.wq@gmail.com?subject=${subject}&body=${mailBody}`;

      await copyText(body);
      nextStep.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    copyBtn.addEventListener('click', async function () {
      await copyText(payload.value || '');
    });
  </script>
</body>
</html>
